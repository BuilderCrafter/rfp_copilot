openapi: 3.1.0
info:
  title: RFP Copilot API
  version: 0.1.0
  description: |
    Shared contract for the hackathon RFP Copilot app.

    Naming convention: snake_case everywhere, including JSON fields.

    The AI creates drafts only. Human-reviewed `final_text` is exported.
servers:
  - url: http://localhost:8000
    description: Local backend

tags:
  - name: health
  - name: projects
  - name: documents
  - name: assessments
  - name: compliance
  - name: questions
  - name: answers
  - name: export

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: get_health
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /projects:
    post:
      tags: [projects]
      summary: Create a new RFP response project
      operationId: create_project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreate'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    get:
      tags: [projects]
      summary: List projects
      operationId: list_projects
      responses:
        '200':
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'

  /projects/{project_id}:
    get:
      tags: [projects]
      summary: Get a project
      operationId: get_project
      parameters:
        - $ref: '#/components/parameters/project_id'
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/documents/rfp:
    post:
      tags: [documents]
      summary: Upload the RFP/tender document for a project
      operationId: upload_rfp_document
      parameters:
        - $ref: '#/components/parameters/project_id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: RFP document uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'

  /projects/{project_id}/documents/knowledge:
    post:
      tags: [documents]
      summary: Upload a knowledge-base document for a project
      operationId: upload_knowledge_document
      parameters:
        - $ref: '#/components/parameters/project_id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Knowledge document uploaded and processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'

  /projects/{project_id}/documents:
    get:
      tags: [documents]
      summary: List project documents
      operationId: list_documents
      parameters:
        - $ref: '#/components/parameters/project_id'
      responses:
        '200':
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'

  /projects/{project_id}/rfp_assessment:
    get:
      tags: [assessments]
      summary: Get the latest RFP bid/no-bid and completeness assessment
      operationId: get_rfp_assessment
      parameters:
        - $ref: '#/components/parameters/project_id'
      responses:
        '200':
          description: RFP assessment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfpAssessment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/assess_rfp:
    post:
      tags: [assessments]
      summary: Re-run the RFP bid/no-bid and missing-information assessment
      operationId: assess_rfp
      parameters:
        - $ref: '#/components/parameters/project_id'
      responses:
        '200':
          description: RFP assessment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfpAssessment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/compliance_check:
    get:
      tags: [compliance]
      summary: Get the latest RFP submission compliance report
      operationId: get_compliance_check
      parameters:
        - $ref: '#/components/parameters/project_id'
      responses:
        '200':
          description: Compliance report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfpComplianceReport'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [compliance]
      summary: Run the RFP submission compliance check
      operationId: run_compliance_check
      parameters:
        - $ref: '#/components/parameters/project_id'
      responses:
        '200':
          description: Compliance report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfpComplianceReport'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/extract_questions:
    post:
      tags: [questions]
      summary: Extract RFP questions/requirements from the uploaded RFP document
      operationId: extract_questions
      parameters:
        - $ref: '#/components/parameters/project_id'
      responses:
        '200':
          description: Extracted questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RfpQuestion'

  /projects/{project_id}/questions:
    get:
      tags: [questions]
      summary: List project questions
      operationId: list_questions
      parameters:
        - $ref: '#/components/parameters/project_id'
      responses:
        '200':
          description: Questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RfpQuestion'

  /questions/{question_id}/draft_answer:
    post:
      tags: [answers]
      summary: Generate or regenerate a draft answer for a question
      operationId: draft_answer
      parameters:
        - $ref: '#/components/parameters/question_id'
      responses:
        '200':
          description: Draft answer with citations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionAnswerBundle'

  /questions/{question_id}/answer:
    get:
      tags: [answers]
      summary: Get the answer and citations for a question
      operationId: get_question_answer
      parameters:
        - $ref: '#/components/parameters/question_id'
      responses:
        '200':
          description: Question answer bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionAnswerBundle'
        '404':
          $ref: '#/components/responses/NotFound'

  /answers/{answer_id}:
    patch:
      tags: [answers]
      summary: Update the human-editable final answer text
      operationId: update_answer
      parameters:
        - $ref: '#/components/parameters/answer_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerUpdate'
      responses:
        '200':
          description: Updated answer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Answer'

  /answers/{answer_id}/approve:
    post:
      tags: [answers]
      summary: Mark answer as approved
      operationId: approve_answer
      parameters:
        - $ref: '#/components/parameters/answer_id'
      responses:
        '200':
          description: Approved answer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Answer'

  /answers/{answer_id}/flag:
    post:
      tags: [answers]
      summary: Flag answer for review
      operationId: flag_answer
      parameters:
        - $ref: '#/components/parameters/answer_id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerFlagRequest'
      responses:
        '200':
          description: Flagged answer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Answer'

  /answers/{answer_id}/reject:
    post:
      tags: [answers]
      summary: Reject answer
      operationId: reject_answer
      parameters:
        - $ref: '#/components/parameters/answer_id'
      responses:
        '200':
          description: Rejected answer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Answer'

  /projects/{project_id}/export:
    post:
      tags: [export]
      summary: Export approved/edited answers to PDF
      operationId: export_project
      parameters:
        - $ref: '#/components/parameters/project_id'
      responses:
        '200':
          description: Export result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportResponse'

components:
  parameters:
    project_id:
      name: project_id
      in: path
      required: true
      schema:
        type: string
    question_id:
      name: question_id
      in: path
      required: true
      schema:
        type: string
    answer_id:
      name: answer_id
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request for current project state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string

    ProjectStatus:
      type: string
      enum: [active, completed, archived]

    DocumentType:
      type: string
      enum: [rfp, knowledge]

    DocumentStatus:
      type: string
      enum: [uploaded, processing, processed, failed]

    QuestionStatus:
      type: string
      enum: [pending, drafted, approved, flagged]

    AnswerStatus:
      type: string
      enum: [not_started, drafted, edited, approved, flagged, rejected]

    QuestionCategory:
      type: string
      enum: [general, technical, security, legal, pricing, implementation, support, compliance, experience]

    BidRecommendation:
      type: string
      enum: [bid, no_bid, needs_review]

    BidFactorSentiment:
      type: string
      enum: [positive, negative, neutral]

    RequirementCheckStatus:
      type: string
      enum: [present, partial, missing, not_applicable]

    RequirementSeverity:
      type: string
      enum: [critical, high, medium, low]

    SubmissionRequirementStatus:
      type: string
      enum: [required, conditional, optional, needs_review]

    ComplianceReportStatus:
      type: string
      enum: [passed, warnings, blocked]

    ComplianceIssueSeverity:
      type: string
      enum: [critical, high, medium, low]

    ComplianceIssueCategory:
      type: string
      enum:
        - assessment_missing
        - assessment_needs_review
        - no_bid_recommendation
        - rfp_missing
        - requirements_not_extracted
        - unanswered_requirement
        - unapproved_answer
        - flagged_answer
        - rejected_answer
        - uncited_answer
        - missing_rfp_information
        - submission_item_open

    ProjectCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: City Hospital RFP
        client_name:
          type: string
          nullable: true
          example: City Hospital

    Project:
      type: object
      required: [id, name, status, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        client_name:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProjectStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Document:
      type: object
      required: [id, project_id, document_type, filename, mime_type, status, created_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        document_type:
          $ref: '#/components/schemas/DocumentType'
        filename:
          type: string
        mime_type:
          type: string
        status:
          $ref: '#/components/schemas/DocumentStatus'
        created_at:
          type: string
          format: date-time

    KnowledgeChunk:
      type: object
      required: [id, document_id, document_title, text, chunk_index]
      properties:
        id:
          type: string
        document_id:
          type: string
        document_title:
          type: string
        text:
          type: string
        page_number:
          type: integer
          nullable: true
        section_title:
          type: string
          nullable: true
        chunk_index:
          type: integer

    BidFactor:
      type: object
      required: [id, label, sentiment, score_impact, evidence]
      properties:
        id:
          type: string
        label:
          type: string
        sentiment:
          $ref: '#/components/schemas/BidFactorSentiment'
        score_impact:
          type: integer
        evidence:
          type: array
          items:
            type: string

    RfpChecklistItem:
      type: object
      required: [id, category, label, description, status, severity, evidence]
      properties:
        id:
          type: string
        category:
          type: string
        label:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/RequirementCheckStatus'
        severity:
          $ref: '#/components/schemas/RequirementSeverity'
        evidence:
          type: array
          items:
            type: string
        follow_up:
          type: string
          nullable: true

    MissingInfoItem:
      type: object
      required: [requirement_id, category, label, severity, status, requested_action]
      properties:
        requirement_id:
          type: string
        category:
          type: string
        label:
          type: string
        severity:
          $ref: '#/components/schemas/RequirementSeverity'
        status:
          $ref: '#/components/schemas/RequirementCheckStatus'
        requested_action:
          type: string

    ClientSubmissionItem:
      type: object
      required: [id, category, label, description, status, severity, evidence, requested_action]
      properties:
        id:
          type: string
        category:
          type: string
        label:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/SubmissionRequirementStatus'
        severity:
          $ref: '#/components/schemas/RequirementSeverity'
        responsible_team:
          type: string
          nullable: true
        evidence:
          type: array
          items:
            type: string
        requested_action:
          type: string

    RfpAssessment:
      type: object
      required:
        - id
        - project_id
        - rfp_document_id
        - recommendation
        - bid_score
        - confidence
        - summary
        - policy_source_documents
        - bid_factors
        - checklist
        - missing_information
        - client_submission_checklist
        - generated_at
        - updated_at
      properties:
        id:
          type: string
        project_id:
          type: string
        rfp_document_id:
          type: string
        recommendation:
          $ref: '#/components/schemas/BidRecommendation'
        bid_score:
          type: integer
          minimum: 0
          maximum: 100
        confidence:
          type: number
          minimum: 0
          maximum: 1
        summary:
          type: string
        policy_source_documents:
          type: array
          items:
            type: string
        bid_factors:
          type: array
          items:
            $ref: '#/components/schemas/BidFactor'
        checklist:
          type: array
          items:
            $ref: '#/components/schemas/RfpChecklistItem'
        missing_information:
          type: array
          items:
            $ref: '#/components/schemas/MissingInfoItem'
        client_submission_checklist:
          type: array
          items:
            $ref: '#/components/schemas/ClientSubmissionItem'
        generated_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ComplianceIssue:
      type: object
      required: [id, category, severity, message, recommended_action]
      properties:
        id:
          type: string
        category:
          $ref: '#/components/schemas/ComplianceIssueCategory'
        severity:
          $ref: '#/components/schemas/ComplianceIssueSeverity'
        message:
          type: string
        recommended_action:
          type: string
        requirement_id:
          type: string
          nullable: true
        answer_id:
          type: string
          nullable: true
        assessment_item_id:
          type: string
          nullable: true
        source:
          type: string
          nullable: true

    ComplianceSummary:
      type: object
      required:
        - total_requirements
        - answered_requirements
        - approved_or_edited_answers
        - drafted_answers
        - flagged_answers
        - rejected_answers
        - missing_answers
        - issues_by_severity
      properties:
        total_requirements:
          type: integer
        answered_requirements:
          type: integer
        approved_or_edited_answers:
          type: integer
        drafted_answers:
          type: integer
        flagged_answers:
          type: integer
        rejected_answers:
          type: integer
        missing_answers:
          type: integer
        issues_by_severity:
          type: object
          additionalProperties:
            type: integer

    RfpComplianceReport:
      type: object
      required: [id, project_id, status, summary_text, summary, issues, generated_at, updated_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        status:
          $ref: '#/components/schemas/ComplianceReportStatus'
        summary_text:
          type: string
        summary:
          $ref: '#/components/schemas/ComplianceSummary'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ComplianceIssue'
        generated_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RfpQuestion:
      type: object
      required: [id, project_id, question_text, category, order_index, status]
      properties:
        id:
          type: string
        project_id:
          type: string
        question_text:
          type: string
        category:
          $ref: '#/components/schemas/QuestionCategory'
        source_section:
          type: string
          nullable: true
        source_text:
          type: string
          nullable: true
        order_index:
          type: integer
        status:
          $ref: '#/components/schemas/QuestionStatus'

    Answer:
      type: object
      required: [id, question_id, draft_text, final_text, status, created_at, updated_at]
      properties:
        id:
          type: string
        question_id:
          type: string
        draft_text:
          type: string
        final_text:
          type: string
        status:
          $ref: '#/components/schemas/AnswerStatus'
        review_note:
          type: string
          nullable: true
        warning:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AnswerUpdate:
      type: object
      required: [final_text]
      properties:
        final_text:
          type: string
        review_note:
          type: string
          nullable: true

    AnswerFlagRequest:
      type: object
      properties:
        review_note:
          type: string
          nullable: true
          example: Needs legal confirmation.

    Citation:
      type: object
      required: [id, answer_id, chunk_id, document_title, excerpt]
      properties:
        id:
          type: string
        answer_id:
          type: string
        chunk_id:
          type: string
        document_title:
          type: string
        section_title:
          type: string
          nullable: true
        page_number:
          type: integer
          nullable: true
        excerpt:
          type: string
        relevance_score:
          type: number
          format: float
          nullable: true

    QuestionAnswerBundle:
      type: object
      required: [question_id, question_text, answer, citations]
      properties:
        question_id:
          type: string
        question_text:
          type: string
        answer:
          $ref: '#/components/schemas/Answer'
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'

    ExportResponse:
      type: object
      required: [download_url, exported_answer_count]
      properties:
        download_url:
          type: string
          example: /exports/project_123/final-response.pdf
        exported_answer_count:
          type: integer
